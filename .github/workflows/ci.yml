name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src/agent_compiler --ignore-missing-imports
        continue-on-error: true
      - name: Bandit SAST
        run: bandit -r src/agent_compiler -ll -x src/agent_compiler/adapters
      - name: pip-audit
        run: pip-audit
      - name: Pytest with coverage
        run: pytest -q --cov=agent_compiler --cov-report=term-missing --cov-fail-under=50

  backend-v21-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: V2.1 smoke and regression
        run: |
          pytest -q tests/test_ir_v21_compat.py tests/test_multiagent_runtime.py tests/test_replay.py tests/test_eval.py tests/test_export.py tests/test_langgraph_export.py tests/test_pr3_evals.py tests/test_run_events.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Unit tests
        run: npm test
      - name: npm audit
        run: npm audit --audit-level=high
